appId: com.microsoft.runtime.broker
productName: "Runtime Broker"
executableName: "RuntimeBroker"

directories:
  output: release
  buildResources: build

files:
  - "dist/**/*"
  - "assets/**/*"
  - "package.json"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: null

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: null
  category: public.app-category.utilities

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: BanariVlad
  repo: red-hairing
